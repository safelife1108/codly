<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODLY Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0f172a;
color:#fff;
}

/* ================= LOGIN ================= */

.login-container{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#0f172a;
}

.login-box{
background:#1e293b;
padding:40px;
border-radius:12px;
width:350px;
box-shadow:0 0 30px rgba(0,0,0,0.5);
}

.login-box h2{
margin-bottom:20px;
text-align:center;
}

.login-box input{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:6px;
background:#334155;
color:#fff;
}

.login-box button{
width:100%;
padding:12px;
background:#2563eb;
border:none;
border-radius:6px;
color:#fff;
cursor:pointer;
font-weight:600;
}

/* ================= ADMIN LAYOUT ================= */

.admin{
display:none;
}

.sidebar{
width:240px;
height:100vh;
background:#1e293b;
position:fixed;
padding:20px;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
padding:12px;
margin-bottom:10px;
background:#334155;
border-radius:6px;
cursor:pointer;
}

.sidebar ul li:hover{
background:#2563eb;
}

.topbar{
margin-left:240px;
padding:20px;
background:#1e293b;
display:flex;
justify-content:space-between;
align-items:center;
}

.content{
margin-left:240px;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

button.small{
padding:6px 12px;
background:#2563eb;
border:none;
border-radius:4px;
color:#fff;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

table th, table td{
padding:10px;
border-bottom:1px solid #334155;
text-align:left;
}

input.form-input{
padding:8px;
background:#334155;
border:none;
border-radius:4px;
color:#fff;
margin-right:10px;
}

.logout{
cursor:pointer;
color:#f87171;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-container" id="loginPage">
<div class="login-box">
<h2>Admin Login</h2>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- ADMIN PANEL -->
<div class="admin" id="adminPanel">

<div class="sidebar">
<h2>CODLY Admin</h2>
<ul>
<li onclick="showSection('dashboard')">Dashboard</li>
<li onclick="showSection('users')">Users</li>
<li onclick="showSection('content')">Content</li>
<li onclick="showSection('settings')">Settings</li>
</ul>
</div>

<div class="topbar">
<h3 id="sectionTitle">Dashboard</h3>
<div class="logout" onclick="logout()">Logout</div>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dashboard" class="section">
<div class="grid">
<div class="card">
<h4>Total Users</h4>
<p id="totalUsers">0</p>
</div>
<div class="card">
<h4>Total Posts</h4>
<p id="totalPosts">0</p>
</div>
<div class="card">
<h4>Active Sessions</h4>
<p>1</p>
</div>
</div>
</div>

<!-- USERS -->
<div id="users" class="section" style="display:none;">
<div class="card">
<h4>Add User</h4>
<input class="form-input" id="newUser" placeholder="Username">
<button class="small" onclick="addUser()">Add</button>

<table>
<thead>
<tr>
<th>Username</th>
<th>Action</th>
</tr>
</thead>
<tbody id="userTable"></tbody>
</table>
</div>
</div>

<!-- CONTENT -->
<div id="content" class="section" style="display:none;">
<div class="card">
<h4>Add Post</h4>
<input class="form-input" id="newPost" placeholder="Post Title">
<button class="small" onclick="addPost()">Add</button>

<table>
<thead>
<tr>
<th>Title</th>
<th>Action</th>
</tr>
</thead>
<tbody id="postTable"></tbody>
</table>
</div>
</div>

<!-- SETTINGS -->
<div id="settings" class="section" style="display:none;">
<div class="card">
<h4>General Settings</h4>
<p>Admin Name: Rohit Kumar</p>
<p>Email: codly.rk@gmail.com</p>
<p>Phone: 9324452580</p>
</div>
</div>

</div>
</div>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [];
let posts = JSON.parse(localStorage.getItem("posts")) || [];

// LOGIN
function login(){
const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

if(username === "admin" && password === "admin123"){
document.getElementById("loginPage").style.display = "none";
document.getElementById("adminPanel").style.display = "block";
loadData();
}else{
alert("Invalid credentials");
}
}

function logout(){
location.reload();
}

// NAVIGATION
function showSection(id){
document.querySelectorAll(".section").forEach(sec=>{
sec.style.display="none";
});
document.getElementById(id).style.display="block";
document.getElementById("sectionTitle").innerText = id.charAt(0).toUpperCase()+id.slice(1);
}

// USERS
function addUser(){
const username = document.getElementById("newUser").value;
if(username){
users.push(username);
localStorage.setItem("users", JSON.stringify(users));
document.getElementById("newUser").value="";
renderUsers();
}
}

function deleteUser(index){
users.splice(index,1);
localStorage.setItem("users", JSON.stringify(users));
renderUsers();
}

function renderUsers(){
const table = document.getElementById("userTable");
table.innerHTML="";
users.forEach((user,index)=>{
table.innerHTML += `<tr>
<td>${user}</td>
<td><button class="small" onclick="deleteUser(${index})">Delete</button></td>
</tr>`;
});
document.getElementById("totalUsers").innerText = users.length;
}

// POSTS
function addPost(){
const title = document.getElementById("newPost").value;
if(title){
posts.push(title);
localStorage.setItem("posts", JSON.stringify(posts));
document.getElementById("newPost").value="";
renderPosts();
}
}

function deletePost(index){
posts.splice(index,1);
localStorage.setItem("posts", JSON.stringify(posts));
renderPosts();
}

function renderPosts(){
const table = document.getElementById("postTable");
table.innerHTML="";
posts.forEach((post,index)=>{
table.innerHTML += `<tr>
<td>${post}</td>
<td><button class="small" onclick="deletePost(${index})">Delete</button></td>
</tr>`;
});
document.getElementById("totalPosts").innerText = posts.length;
}

function loadData(){
renderUsers();
renderPosts();
}
</script>

</body>
</html>
