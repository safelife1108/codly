<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Codly Market — Marketplace Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,Arial,sans-serif}
body{background:#faf7f4;color:#2b2b2b}

/* COLORS */
:root{
  --dark:#2f1f17;
  --brown:#3b2419;
  --accent:#a56a43;
  --light:#f4ece6;
}

/* LOADER */
#loader{
  position:fixed;inset:0;background:var(--dark);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  z-index:9999;color:#f3e7de
}
.spinner{width:50px;height:50px;border:4px solid #5a3b2e;border-top:4px solid var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* HEADER */
header{background:var(--dark);color:#f3e7de;position:sticky;top:0;z-index:1000}
.topbar{max-width:1200px;margin:auto;padding:10px 16px;display:flex;gap:12px;align-items:center}
.logo{font-weight:800;color:#d4a373}
.search{flex:1;display:flex}
.search input{flex:1;padding:10px;border:none;border-radius:6px 0 0 6px}
.search button{padding:10px 14px;border:none;background:var(--accent);color:#fff;border-radius:0 6px 6px 0;cursor:pointer}
.actions button{background:#3b2419;border:1px solid #5a3b2e;color:#f3e7de;padding:8px 12px;border-radius:6px;cursor:pointer}

.catbar{background:#3b2419}
.catbar .inner{max-width:1200px;margin:auto;padding:8px 16px;display:flex;gap:16px;overflow:auto}
.catbar a{color:#e6d5c7;text-decoration:none;font-size:14px}

/* LAYOUT */
.container{max-width:1200px;margin:20px auto;padding:0 16px}
.hidden{display:none}

/* PRODUCTS */
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.card{background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e6ded8;box-shadow:0 6px 20px rgba(0,0,0,.06);display:flex;flex-direction:column}
.card img{width:100%;height:160px;object-fit:cover;cursor:pointer}
.card .body{padding:10px;display:flex;flex-direction:column;gap:6px;flex:1}
.price{color:var(--accent);font-weight:800}
.old{color:#999;text-decoration:line-through;font-size:12px}
.card button{margin-top:auto;padding:8px;border:none;background:var(--accent);color:#fff;font-weight:700;border-radius:8px;cursor:pointer}

/* PAGES */
.page{display:none}
.page.active{display:block}

/* FOOTER */
footer{background:var(--dark);color:#d8c6b8;margin-top:40px}
.footer-inner{max-width:1200px;margin:auto;padding:40px 16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:24px}

/* FORMS */
input, textarea{width:100%;padding:10px;margin-bottom:10px;border-radius:6px;border:1px solid #ddd}
.btn{padding:10px 14px;border:none;background:var(--accent);color:#fff;font-weight:700;border-radius:8px;cursor:pointer}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <h2>CODLY MARKET</h2>
  <div class="spinner"></div>
</div>

<!-- HEADER -->
<header>
  <div class="topbar">
    <div class="logo" onclick="goHome()">CODLY</div>
    <div class="search">
      <input id="searchInput" placeholder="Search products...">
      <button onclick="renderProducts()">Search</button>
    </div>
    <div class="actions">
      <button onclick="showPage('login')">Login</button>
      <button onclick="showPage('cart')">Cart (<span id="cartCount">0</span>)</button>
    </div>
  </div>
  <div class="catbar">
    <div class="inner">
      <a href="#" onclick="setCategory('all')">All</a>
      <a href="#" onclick="setCategory('fashion')">Fashion</a>
      <a href="#" onclick="setCategory('electronics')">Electronics</a>
      <a href="#" onclick="setCategory('footwear')">Footwear</a>
      <a href="#" onclick="setCategory('accessories')">Accessories</a>
    </div>
  </div>
</header>

<div class="container">

<!-- HOME -->
<div id="home" class="page active">
  <h2>Big Deals, Premium Style</h2>
  <p>Marketplace demo inspired by Amazon / Flipkart style.</p>
  <br>
  <div class="products" id="productGrid"></div>
</div>

<!-- PRODUCT DETAIL -->
<div id="productPage" class="page">
  <button class="btn" onclick="goHome()">← Back</button>
  <div id="productDetail"></div>
</div>

<!-- CART -->
<div id="cart" class="page">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <br>
  <button class="btn" onclick="showPage('checkout')">Proceed to Checkout</button>
</div>

<!-- CHECKOUT -->
<div id="checkout" class="page">
  <h2>Checkout</h2>
  <input placeholder="Full Address">
  <input placeholder="Card Number">
  <button class="btn" onclick="alert('Order placed (demo)')">Place Order</button>
</div>

<!-- LOGIN -->
<div id="login" class="page">
  <h2>Login</h2>
  <input placeholder="Email">
  <input type="password" placeholder="Password">
  <button class="btn" onclick="goHome()">Login</button>
</div>

</div>

<!-- FOOTER -->
<footer>
  <div class="footer-inner">
    <div><h4>Codly Market</h4><p>Marketplace demo for portfolio.</p></div>
    <div><h4>Contact</h4><p>Mumbai, India</p><p>support@codlymarket.in</p></div>
  </div>
</footer>

<script>
window.addEventListener("load",()=>setTimeout(()=>document.getElementById("loader").style.display="none",800));

const products=[
{id:1,title:"Sneakers",cat:"footwear",price:2499,old:3199,img:"https://images.unsplash.com/photo-1491553895911-0055eca6402d?q=80&w=1000"},
{id:2,title:"Headphones",cat:"electronics",price:1999,old:2499,img:"https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?q=80&w=1000"},
{id:3,title:"Watch",cat:"accessories",price:3499,old:4299,img:"https://images.unsplash.com/photo-1503602642458-232111445657?q=80&w=1000"},
{id:4,title:"Camera",cat:"electronics",price:18999,old:22999,img:"https://images.unsplash.com/photo-1512499617640-c2f999fe2b8c?q=80&w=1000"},
{id:5,title:"Jacket",cat:"fashion",price:2899,old:3599,img:"https://images.unsplash.com/photo-1512436991641-6745cdb1723f?q=80&w=1000"},
];

let currentCategory="all";
let cart=[];

function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goHome(){ showPage("home"); }

function setCategory(cat){ currentCategory=cat; renderProducts(); }

function renderProducts(){
  const grid=document.getElementById("productGrid");
  grid.innerHTML="";
  const q=document.getElementById("searchInput").value.toLowerCase();
  products.filter(p=>{
    return (currentCategory==="all"||p.cat===currentCategory) && p.title.toLowerCase().includes(q);
  }).forEach(p=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <img src="${p.img}" onclick="openProduct(${p.id})">
      <div class="body">
        <strong>${p.title}</strong>
        <div><span class="price">₹${p.price}</span> <span class="old">₹${p.old}</span></div>
        <button onclick="addToCart(${p.id})">Add to Cart</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function openProduct(id){
  const p=products.find(x=>x.id===id);
  const box=document.getElementById("productDetail");
  box.innerHTML=`
    <h2>${p.title}</h2>
    <img src="${p.img}" style="max-width:300px;width:100%;border-radius:12px">
    <p>Price: ₹${p.price}</p>
    <button class="btn" onclick="addToCart(${p.id})">Add to Cart</button>
  `;
  showPage("productPage");
}

function addToCart(id){
  const p=products.find(x=>x.id===id);
  cart.push(p);
  document.getElementById("cartCount").textContent=cart.length;
  renderCart();
}

function renderCart(){
  const box=document.getElementById("cartItems");
  box.innerHTML="";
  cart.forEach(item=>{
    const div=document.createElement("div");
    div.innerHTML=`<p>${item.title} - ₹${item.price}</p>`;
    box.appendChild(div);
  });
}

renderProducts();
</script>
</body>
</html>
