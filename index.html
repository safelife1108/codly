<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CODLY – Realistic Galaxy</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
margin:0;
overflow-x:hidden;
background:black;
color:white;
font-family:Poppins;
}
canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}
section{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
padding:100px 20px;
}
h1{
font-family:Orbitron;
font-size:clamp(60px,8vw,120px);
letter-spacing:5px;
}
p{
max-width:700px;
opacity:.8;
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<section>
<h1>CODLY</h1>
<p>Immersive galaxy environment. Cinematic depth. Realistic spiral structure.</p>
</section>

<section>
<h1>OMEGA SPACE</h1>
<p>Engineered with procedural spiral galaxy distribution and nebula depth layering.</p>
</section>

<script>

gsap.registerPlugin(ScrollTrigger);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth / window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("bg"),
alpha:true
});

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
camera.position.z = 35;

/* =========================
   REALISTIC SPIRAL GALAXY
========================= */

const starCount = 120000;
const arms = 4;
const radius = 80;
const spin = 3;

const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(starCount * 3);
const colors = new Float32Array(starCount * 3);

for(let i = 0; i < starCount; i++){

const i3 = i * 3;

// radius distribution (denser core)
const r = Math.random() * radius;
const branchAngle = (i % arms) / arms * Math.PI * 2;
const spinAngle = r * spin;

const randomX = (Math.random() - 0.5) * 2;
const randomY = (Math.random() - 0.5) * 2;
const randomZ = (Math.random() - 0.5) * 2;

positions[i3] =
Math.cos(branchAngle + spinAngle) * r + randomX;

positions[i3 + 1] =
randomY * 0.6;

positions[i3 + 2] =
Math.sin(branchAngle + spinAngle) * r + randomZ;

// color gradient (core blue → outer warm)
const color = new THREE.Color();
const mix = r / radius;
color.setHSL(0.6 - mix * 0.6, 1, 0.7);

colors[i3] = color.r;
colors[i3 + 1] = color.g;
colors[i3 + 2] = color.b;
}

geometry.setAttribute("position", new THREE.BufferAttribute(positions,3));
geometry.setAttribute("color", new THREE.BufferAttribute(colors,3));

const material = new THREE.PointsMaterial({
size:0.15,
vertexColors:true,
transparent:true,
opacity:0.9,
blending:THREE.AdditiveBlending
});

const galaxy = new THREE.Points(geometry, material);
scene.add(galaxy);

/* =========================
   NEBULA CLOUD
========================= */

const nebulaGeometry = new THREE.SphereGeometry(40,64,64);
const nebulaMaterial = new THREE.MeshBasicMaterial({
color:0x2233ff,
transparent:true,
opacity:0.05
});
const nebula = new THREE.Mesh(nebulaGeometry, nebulaMaterial);
scene.add(nebula);

/* =========================
   MOUSE PARALLAX
========================= */

let mouseX = 0;
let mouseY = 0;

document.addEventListener("mousemove", e=>{
mouseX = (e.clientX / window.innerWidth - 0.5) * 10;
mouseY = (e.clientY / window.innerHeight - 0.5) * 10;
});

/* =========================
   SCROLL WARP
========================= */

let warp = 0;

ScrollTrigger.create({
trigger:"body",
start:"top top",
end:"bottom bottom",
scrub:true,
onUpdate:self=>{
warp = self.progress * 2;
}
});

/* =========================
   ANIMATION LOOP
========================= */

function animate(){
requestAnimationFrame(animate);

// slow rotation
galaxy.rotation.y += 0.0005;
nebula.rotation.y += 0.0002;

// camera drift
camera.position.x += (mouseX - camera.position.x) * 0.02;
camera.position.y += (-mouseY - camera.position.y) * 0.02;

// warp zoom
camera.position.z = 35 - warp * 15;

renderer.render(scene, camera);
}

animate();

/* =========================
   RESIZE
========================= */

window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
