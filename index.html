<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CODLY – Astrophysics Level</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}
canvas{
display:block;
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<script>

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({
canvas:document.getElementById("bg"),
antialias:true
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
camera.position.z = 40;

/* =============================
   STAR SHADER (REAL GLOW)
============================= */

const starCount = 100000;
const geometry = new THREE.BufferGeometry();

const positions = new Float32Array(starCount * 3);
const sizes = new Float32Array(starCount);
const temps = new Float32Array(starCount);

for(let i=0;i<starCount;i++){

const r = Math.random()*120;
const theta = Math.random()*Math.PI*2;
const phi = Math.acos((Math.random()*2)-1);

positions[i*3] = r * Math.sin(phi)*Math.cos(theta);
positions[i*3+1] = r * Math.sin(phi)*Math.sin(theta);
positions[i*3+2] = r * Math.cos(phi);

sizes[i] = Math.random()*3+1;
temps[i] = Math.random(); // temperature factor
}

geometry.setAttribute("position", new THREE.BufferAttribute(positions,3));
geometry.setAttribute("aSize", new THREE.BufferAttribute(sizes,1));
geometry.setAttribute("aTemp", new THREE.BufferAttribute(temps,1));

const material = new THREE.ShaderMaterial({
transparent:true,
depthWrite:false,
blending:THREE.AdditiveBlending,
uniforms:{
uTime:{value:0}
},
vertexShader:`
attribute float aSize;
attribute float aTemp;
varying float vTemp;
varying float vTwinkle;

uniform float uTime;

void main(){
vTemp = aTemp;
vTwinkle = sin(uTime*2.0 + aTemp*10.0)*0.5+0.5;

vec4 mvPosition = modelViewMatrix * vec4(position,1.0);
gl_PointSize = aSize * (300.0 / -mvPosition.z);
gl_Position = projectionMatrix * mvPosition;
}
`,
fragmentShader:`
precision highp float;
varying float vTemp;
varying float vTwinkle;

vec3 kelvinColor(float t){
float temp = 1000.0 + t*9000.0;
float r,g,b;

if(temp <= 6600.0){
r = 1.0;
g = clamp(temp/6600.0,0.0,1.0);
b = 0.2 + temp/12000.0;
}else{
r = clamp(1.0 - (temp-6600.0)/9000.0,0.0,1.0);
g = 1.0;
b = 1.0;
}
return vec3(r,g,b);
}

void main(){

float dist = length(gl_PointCoord - vec2(0.5));
float glow = smoothstep(0.5,0.0,dist);

vec3 color = kelvinColor(vTemp);
gl_FragColor = vec4(color * glow * vTwinkle, glow);
}
`
});

const stars = new THREE.Points(geometry, material);
scene.add(stars);

/* =============================
   NEBULA VOLUMETRIC SHADER
============================= */

const nebulaGeo = new THREE.SphereGeometry(100,64,64);

const nebulaMat = new THREE.ShaderMaterial({
transparent:true,
side:THREE.BackSide,
uniforms:{
uTime:{value:0}
},
vertexShader:`
varying vec3 vPos;
void main(){
vPos = position;
gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
}
`,
fragmentShader:`
precision highp float;
varying vec3 vPos;
uniform float uTime;

float noise(vec3 p){
return fract(sin(dot(p,vec3(12.9898,78.233,45.164))) * 43758.5453);
}

void main(){
float n = noise(vPos*0.05 + uTime*0.05);
vec3 color = mix(vec3(0.1,0.0,0.3), vec3(0.0,0.2,0.6), n);
gl_FragColor = vec4(color, 0.05);
}
`
});

const nebula = new THREE.Mesh(nebulaGeo, nebulaMat);
scene.add(nebula);

/* =============================
   GRAVITATIONAL LENS DISTORTION
============================= */

let mouse = new THREE.Vector2(0,0);

document.addEventListener("mousemove", e=>{
mouse.x = (e.clientX/window.innerWidth - 0.5)*10;
mouse.y = (e.clientY/window.innerHeight - 0.5)*10;
});

/* =============================
   ANIMATION LOOP
============================= */

function animate(time){

requestAnimationFrame(animate);

material.uniforms.uTime.value = time*0.001;
nebulaMat.uniforms.uTime.value = time*0.001;

stars.rotation.y += 0.0003;
nebula.rotation.y += 0.0001;

camera.position.x += (mouse.x - camera.position.x)*0.02;
camera.position.y += (-mouse.y - camera.position.y)*0.02;

renderer.render(scene,camera);
}

animate();

/* =============================
   RESIZE
============================= */

window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
