<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODLY – TRANSCENDENCE MODE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<!-- Three.js + Postprocessing -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FontLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/geometries/TextGeometry.js"></script>

<style>
:root{
--bg:#01030a;
--text:#ffffff;
--muted:#7e8aa5;
--border:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{background:var(--bg);color:var(--text);overflow-x:hidden;}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;}

.loader{
position:fixed;inset:0;background:#000;display:flex;
align-items:center;justify-content:center;z-index:4000;
}
.loader h1{
font-family:'Playfair Display',serif;
font-size:90px;letter-spacing:10px;
}

header{
position:fixed;top:0;width:100%;padding:20px 8%;
display:flex;justify-content:space-between;
background:rgba(0,0,0,0.4);backdrop-filter:blur(20px);
border-bottom:1px solid var(--border);z-index:1000;
}
header a{color:var(--muted);margin-left:30px;text-decoration:none;}
header a:hover{color:#fff;}

section{
min-height:100vh;padding:160px 8%;
display:flex;flex-direction:column;justify-content:center;
position:relative;z-index:2;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:clamp(100px,12vw,180px);
line-height:0.9;
}

.hero p{margin-top:20px;color:var(--muted);max-width:600px;}

.story{height:350vh;}
.story-inner{
position:sticky;top:0;height:100vh;
display:flex;align-items:center;justify-content:center;
flex-direction:column;text-align:center;
}
.story h2{
font-family:'Playfair Display',serif;
font-size:clamp(50px,7vw,90px);
opacity:0;transform:translateY(50px);
}

.grid{
display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:50px;margin-top:80px;
}
.card{
background:rgba(255,255,255,0.05);
border:1px solid var(--border);
border-radius:30px;padding:60px;
transition:0.6s;
}
.card:hover{transform:translateY(-25px) scale(1.08);}

footer{
padding:80px 8%;border-top:1px solid var(--border);
text-align:center;color:var(--muted);
}
</style>
</head>

<body>

<div class="loader"><h1>CODLY</h1></div>
<canvas id="bg"></canvas>

<header>
<div><strong>CODLY</strong></div>
<nav>
<a href="#about">About</a>
<a href="#skills">Skills</a>
<a href="#projects">Projects</a>
</nav>
</header>

<section class="hero">
<h1>CODLY</h1>
<p>Designing Digital Experiences That Feel Alive.</p>
</section>

<section class="story">
<div class="story-inner">
<h2 class="line1">I Design Systems.</h2>
<h2 class="line2">I Build Digital Presence.</h2>
<h2 class="line3">I Craft Experiences.</h2>
</div>
</section>

<section id="skills">
<h2>Capabilities</h2>
<div class="grid">
<div class="card">UI/UX Design</div>
<div class="card">Branding</div>
<div class="card">Web Engineering</div>
<div class="card">Flutter Apps</div>
<div class="card">Motion Editing</div>
<div class="card">AI Systems</div>
</div>
</section>

<footer>
<p>CODLY – Rohit Kumar</p>
<p>© 2026</p>
</footer>

<script>
gsap.registerPlugin(ScrollTrigger);

/* Loader */
window.addEventListener("load",()=>{
gsap.to(".loader h1",{scale:1.2,opacity:0,duration:1.5});
gsap.to(".loader",{opacity:0,duration:1.5,delay:1.2,onComplete:()=>document.querySelector(".loader").style.display="none"});
});

/* Scroll Text */
gsap.utils.toArray(".story h2").forEach((el,i)=>{
gsap.to(el,{
opacity:1,y:0,
scrollTrigger:{
trigger:".story",
start:"top top+=" + (i*400),
end:"top top+=" + (i*700),
scrub:true
}
});
});

/* THREE SCENE */
const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x000000,10,50);

const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.z=20;

const renderer=new THREE.WebGLRenderer({canvas:document.getElementById("bg"),alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);

/* Shader Plane */
const geometry=new THREE.PlaneGeometry(100,100,128,128);
const material=new THREE.ShaderMaterial({
uniforms:{time:{value:0}},
vertexShader:`
uniform float time;
void main(){
vec3 pos=position;
pos.z+=sin(pos.x*0.3+time)*1.5;
pos.z+=cos(pos.y*0.3+time)*1.5;
gl_Position=projectionMatrix*modelViewMatrix*vec4(pos,1.0);
}`,
fragmentShader:`
void main(){
gl_FragColor=vec4(0.05,0.1,0.25,1.0);
}`
});
const plane=new THREE.Mesh(geometry,material);
plane.rotation.x=-Math.PI/2;
scene.add(plane);

/* Bloom */
const composer=new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene,camera));
const bloom=new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth,window.innerHeight),1.5,0.4,0.85);
composer.addPass(bloom);

/* Animate */
function animate(){
requestAnimationFrame(animate);
material.uniforms.time.value+=0.02;
plane.rotation.z+=0.0005;
composer.render();
}
animate();

/* Scroll Camera */
ScrollTrigger.create({
trigger:".story",
start:"top top",
end:"bottom bottom",
scrub:true,
onUpdate:self=>{
camera.position.z=20-self.progress*8;
}
});

window.addEventListener("resize",()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

</body>
</html>
