<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODLY – OMEGA MODE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Orbitron:wght@500;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
:root{
--bg:#000814;
--text:#ffffff;
--muted:#8ea0c5;
--border:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{
background:radial-gradient(circle at 50% 20%, #001233, #000814 60%);
color:var(--text);
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* ================= LOADER ================= */
.loader{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:5000;
overflow:hidden;
}

.loader h1{
font-family:'Orbitron',sans-serif;
font-size:70px;
letter-spacing:10px;
position:relative;
color:#fff;
}

.loader h1::before,
.loader h1::after{
content:"CODLY";
position:absolute;
left:0;
top:0;
}

.loader h1::before{
color:#00f0ff;
animation:glitch1 0.8s infinite linear alternate-reverse;
}

.loader h1::after{
color:#ff004c;
animation:glitch2 0.8s infinite linear alternate-reverse;
}

@keyframes glitch1{
0%{transform:translate(0);}
20%{transform:translate(-4px,2px);}
40%{transform:translate(-2px,-3px);}
60%{transform:translate(3px,1px);}
80%{transform:translate(-1px,2px);}
100%{transform:translate(0);}
}

@keyframes glitch2{
0%{transform:translate(0);}
20%{transform:translate(4px,-2px);}
40%{transform:translate(2px,3px);}
60%{transform:translate(-3px,-1px);}
80%{transform:translate(1px,-2px);}
100%{transform:translate(0);}
}

/* ================= HERO GLITCH (SAME STYLE) ================= */

.glitch-hero{
position:relative;
font-family:'Orbitron',sans-serif;
font-size:clamp(70px,9vw,120px);
letter-spacing:6px;
color:#ffffff;
}

.glitch-hero::before,
.glitch-hero::after{
content:attr(data-text);
position:absolute;
left:0;
top:0;
width:100%;
overflow:hidden;
}

.glitch-hero::before{
left:2px;
text-shadow:-2px 0 #00f0ff;
animation:hero-glitch-1 1.2s infinite linear alternate-reverse;
}

.glitch-hero::after{
left:-2px;
text-shadow:-2px 0 #ff004c;
animation:hero-glitch-2 1.2s infinite linear alternate-reverse;
}

@keyframes hero-glitch-1{
0%{clip-path:inset(0 0 85% 0);}
20%{clip-path:inset(10% 0 60% 0);}
40%{clip-path:inset(40% 0 20% 0);}
60%{clip-path:inset(20% 0 50% 0);}
80%{clip-path:inset(60% 0 10% 0);}
100%{clip-path:inset(0 0 85% 0);}
}

@keyframes hero-glitch-2{
0%{clip-path:inset(80% 0 0 0);}
20%{clip-path:inset(60% 0 10% 0);}
40%{clip-path:inset(20% 0 40% 0);}
60%{clip-path:inset(50% 0 20% 0);}
80%{clip-path:inset(10% 0 60% 0);}
100%{clip-path:inset(80% 0 0 0);}
}

/* ================= REST SAME ================= */

header{
position:fixed;
top:0;width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(15px);
border-bottom:1px solid var(--border);
z-index:1000;
}

.logo{display:flex;align-items:center;gap:10px;}
.logo img{height:32px;}

header a{
color:var(--muted);
text-decoration:none;
margin-left:25px;
font-size:14px;
transition:.3s;
}
header a:hover{color:#fff;}

section{
min-height:100vh;
padding:140px 8%;
position:relative;
z-index:2;
display:flex;
flex-direction:column;
justify-content:center;
}

.hero p{
margin-top:20px;
max-width:700px;
color:var(--muted);
font-size:18px;
}

.story{height:280vh;}
.story-inner{
position:sticky;
top:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:60px;
text-align:center;
}
.reveal{
font-size:clamp(30px,4vw,55px);
font-weight:700;
}
.reveal span{
display:inline-block;
opacity:0;
transform:translateY(40px);
}

.about p{
max-width:900px;
line-height:1.9;
color:var(--muted);
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
margin-top:50px;
}

.card{
background:rgba(255,255,255,0.04);
border:1px solid var(--border);
border-radius:16px;
padding:35px;
text-align:center;
font-weight:600;
text-decoration:none;
color:#fff;
transition:.4s;
}
.card:hover{
transform:translateY(-10px);
background:rgba(255,255,255,0.1);
}

.footer{
background:#000;
padding:120px 8%;
border-top:1px solid var(--border);
}

.footer-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:60px;
}

.footer h3{margin-bottom:20px;font-size:18px;}
.footer p,.footer a{
color:var(--muted);
font-size:14px;
line-height:1.8;
text-decoration:none;
}
.footer a:hover{color:#fff;}

.footer-bottom{
margin-top:60px;
padding-top:30px;
border-top:1px solid var(--border);
text-align:center;
color:var(--muted);
font-size:13px;
}
</style>
</head>

<body>

<div class="loader"><h1>CODLY</h1></div>
<canvas id="bg"></canvas>

<header>
<div class="logo">
<img src="codly logo.jpg">
<strong>CODLY</strong>
</div>
<nav>
<a href="#about">About</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero">
<h1 class="glitch-hero" data-text="OMEGA MODE">OMEGA MODE</h1>
<p>Digital engineering beyond dimensions. Crafting immersive systems that command attention and convert presence into power.</p>
</section>

<!-- ALL YOUR OTHER SECTIONS REMAIN EXACTLY SAME -->

<script>
gsap.registerPlugin(ScrollTrigger);

/* Loader fade */
window.addEventListener("load",()=>{
gsap.to(".loader",{opacity:0,duration:1.5,delay:1.5,onComplete:()=>document.querySelector(".loader").style.display="none"});
});
</script>

</body>
</html>
