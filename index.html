<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODLY – Transcend Physics</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Orbitron:wght@600;700;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
:root{
--bg:#000;
--text:#fff;
--muted:#9bb3ff;
--accent:#00f0ff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{background:#000;color:#fff;overflow-x:hidden;}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-5;
}

.loader{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}
.loader h1{
font-family:Orbitron;
font-size:80px;
letter-spacing:12px;
animation:glitch 1s infinite;
}
@keyframes glitch{
0%{text-shadow:3px 0 red,-3px 0 cyan;}
50%{text-shadow:-3px 0 red,3px 0 cyan;}
100%{text-shadow:3px 0 red,-3px 0 cyan;}
}

header{
position:fixed;
top:0;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(20px);
z-index:1000;
}
.logo{font-family:Orbitron;}
nav a{margin-left:25px;color:var(--muted);text-decoration:none;}

section{
min-height:100vh;
padding:160px 8%;
display:flex;
flex-direction:column;
justify-content:center;
}

.hero h1{
font-family:Orbitron;
font-size:clamp(60px,9vw,120px);
}
.hero p{margin-top:20px;color:var(--muted);}
</style>
</head>

<body>

<div class="loader"><h1>CODLY</h1></div>
<canvas id="space"></canvas>

<header>
<div class="logo">CODLY</div>
<nav>
<a href="#about">About</a>
<a href="#portfolio">Portfolio</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero">
<h1>CODLY</h1>
<p>Beyond digital. Beyond scale. Beyond limits.</p>
</section>

<section id="about">
<h2>About</h2>
<p>Astrophysics-grade digital engineering powered by AI systems and scalable architecture.</p>
</section>

<section id="portfolio">
<h2>Portfolio</h2>
<p>Explore premium digital systems engineered for performance.</p>
</section>

<section id="contact">
<h2>Contact</h2>
<p>Email: Codly.rk@gmail.com</p>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

window.addEventListener("load",()=>{
gsap.to(".loader",{opacity:0,duration:1.5,onComplete:()=>document.querySelector(".loader").style.display="none"});
});

/* SCENE SETUP */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,2000);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById("space"),alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
camera.position.z=15;

/* BLOOM */
const composer=new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene,camera));
const bloom=new THREE.UnrealBloomPass(
new THREE.Vector2(window.innerWidth,window.innerHeight),
1.5,0.4,0.85
);
composer.addPass(bloom);

/* STAR FIELD */
const starGeo=new THREE.BufferGeometry();
const starCount=20000;
const positions=new Float32Array(starCount*3);
for(let i=0;i<starCount;i++){
positions[i*3]=(Math.random()-0.5)*1000;
positions[i*3+1]=(Math.random()-0.5)*1000;
positions[i*3+2]=(Math.random()-0.5)*1000;
}
starGeo.setAttribute("position",new THREE.BufferAttribute(positions,3));
const starMat=new THREE.PointsMaterial({color:0xffffff,size:0.8});
const stars=new THREE.Points(starGeo,starMat);
scene.add(stars);

/* BLACK HOLE */
const holeGeo=new THREE.CircleGeometry(25,64);
const holeMat=new THREE.MeshBasicMaterial({color:0x000000});
const blackHole=new THREE.Mesh(holeGeo,holeMat);
blackHole.position.z=-100;
scene.add(blackHole);

/* MOUSE GRAVITY */
let mouseX=0,mouseY=0;
document.addEventListener("mousemove",(e)=>{
mouseX=(e.clientX/window.innerWidth-0.5)*2;
mouseY=(e.clientY/window.innerHeight-0.5)*2;
});

/* SCROLL WARP */
ScrollTrigger.create({
start:0,
end:"max",
scrub:true,
onUpdate:self=>{
camera.position.z=15-self.progress*10;
stars.rotation.y+=0.005+self.progress*0.05;
}
});

function animate(){
requestAnimationFrame(animate);
camera.position.x+=(mouseX-camera.position.x)*0.05;
camera.position.y+=(-mouseY-camera.position.y)*0.05;
stars.rotation.y+=0.001;
composer.render();
}
animate();

window.addEventListener("resize",()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
composer.setSize(window.innerWidth,window.innerHeight);
});
</script>

</body>
</html>
