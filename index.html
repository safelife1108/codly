<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODLY – Digital Systems Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollSmoother.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
:root{
--text:#ffffff;
--muted:#aabfff;
--border:rgba(255,255,255,0.08);
--accent:#00eaff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{
background:radial-gradient(circle at 30% 20%, #001f4d 0%, #000c24 40%, #000000 80%);
color:var(--text);
overflow-x:hidden;
}

/* Smooth Wrapper */
#smooth-wrapper{position:relative;}
#smooth-content{position:relative;}

canvas{
position:fixed;
top:0;left:0;
width:100%;height:100%;
z-index:0;
}

/* NAVBAR */

header{
position:fixed;
top:0;width:100%;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
transition:.4s;
}

header.scrolled{
background:rgba(0,0,0,0.65);
backdrop-filter:blur(18px);
border-bottom:1px solid var(--border);
}

.logo{
font-family:'Orbitron';
display:flex;
align-items:center;
gap:10px;
letter-spacing:2px;
}

.logo img{height:28px;}

nav a{
color:var(--muted);
margin-left:28px;
text-decoration:none;
font-size:14px;
transition:.3s;
position:relative;
}

nav a:hover{color:#fff;}

nav a::after{
content:"";
position:absolute;
bottom:-6px;
left:0;width:0%;
height:2px;
background:var(--accent);
transition:.3s;
}

nav a:hover::after{width:100%;}

/* FUTURISTIC GLITCH */

.glitch{
font-family:'Orbitron';
font-size:clamp(100px,12vw,170px);
letter-spacing:12px;
position:relative;
color:#fff;
}

.glitch::before,
.glitch::after{
content:attr(data-text);
position:absolute;
left:0;top:0;
opacity:.35;
}

.glitch::before{
color:#00eaff;
animation:gl1 3s infinite ease-in-out;
}

.glitch::after{
color:#ff00ff;
animation:gl2 3s infinite ease-in-out;
}

@keyframes gl1{
0%,100%{transform:translate(0);}
50%{transform:translate(-1px,1px);}
}

@keyframes gl2{
0%,100%{transform:translate(0);}
50%{transform:translate(1px,-1px);}
}

/* LOADER */

.loader{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:5000;
}

/* SECTIONS */

section{
min-height:100vh;
padding:160px 8%;
position:relative;
z-index:2;
opacity:0;
transform:translateY(60px);
}

.section-title{
font-family:'Orbitron';
font-size:42px;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:35px;
}

.card{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,0.1);
border-radius:18px;
padding:35px;
transition:.4s;
color:#fff;
text-decoration:none;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 30px rgba(0,255,255,0.25);
}

/* AUTHORITY LINES */

.authority-sequence{
margin-top:60px;
font-weight:600;
font-size:24px;
line-height:1.6;
}

.authority-line{
opacity:0;
transform:translateY(40px);
margin-bottom:15px;
}

/* CTA */

.cta{
padding:140px 8%;
text-align:center;
background:linear-gradient(180deg,rgba(0,40,120,0.6),rgba(0,0,0,0.9));
}

.cta h2{
font-family:'Orbitron';
font-size:48px;
margin-bottom:40px;
}

.cta button{
padding:18px 60px;
background:linear-gradient(90deg,#00eaff,#ff00ff,#ffee00);
border:none;
border-radius:50px;
font-weight:600;
cursor:pointer;
color:#000;
}

/* FOOTER */

.footer{
background:#000814;
padding:140px 8%;
border-top:1px solid var(--border);
}

.footer-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:70px;
}

.footer-bottom{
margin-top:60px;
padding-top:30px;
border-top:1px solid var(--border);
text-align:center;
color:#8ea0c5;
font-size:14px;
}
</style>
</head>

<body>

<div class="loader">
<h1 class="glitch" data-text="CODLY">CODLY</h1>
</div>

<canvas id="bg"></canvas>

<div id="smooth-wrapper">
<div id="smooth-content">

<header id="navbar">
<div class="logo">
<img src="codly logo.jpg">
CODLY
</div>
<nav>
<a href="#about">About</a>
<a href="#services">Services</a>
<a href="#projects">Portfolio</a>
<a href="#faq">FAQ</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero">
<h1 class="glitch" data-text="CODLY">CODLY</h1>

<div class="authority-sequence">
<div class="authority-line">Digital System Engineer for Authority</div>
<div class="authority-line">AI Automation • Scalable Architecture</div>
<div class="authority-line">Strategic Growth — From Concept to Conversion</div>
</div>

<p style="margin-top:30px;max-width:900px;color:#c9d4ff;">
Engineering intelligent digital systems structured for performance, automation and scalable authority positioning.
</p>
</section>

<!-- Other sections remain same (About, Services, Portfolio, FAQ, CTA, Contact, Footer) -->
<!-- Keeping your full structure intact -->

</div>
</div>

<script>
gsap.registerPlugin(ScrollTrigger, ScrollSmoother);

/* Smooth Scroll */
ScrollSmoother.create({
wrapper:"#smooth-wrapper",
content:"#smooth-content",
smooth:1.2,
effects:true
});

/* Loader */
window.addEventListener("load",()=>{
gsap.to(".loader",{opacity:0,duration:1.5,delay:2,onComplete:()=>document.querySelector(".loader").style.display="none"});
});

/* Navbar scroll */
window.addEventListener("scroll",()=>{
const nav=document.getElementById("navbar");
if(window.scrollY>50){nav.classList.add("scrolled");}
else{nav.classList.remove("scrolled");}
});

/* Section fade reveal */
gsap.utils.toArray("section").forEach(sec=>{
gsap.to(sec,{
opacity:1,
y:0,
duration:1.2,
ease:"power3.out",
scrollTrigger:{
trigger:sec,
start:"top 85%"
}
});
});

/* Authority sequence animation */
gsap.utils.toArray(".authority-line").forEach((line,i)=>{
gsap.to(line,{
opacity:1,
y:0,
duration:1,
delay:i*0.2,
scrollTrigger:{
trigger:".authority-sequence",
start:"top 80%"
}
});
});

/* STARFIELD */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById("bg"),alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
camera.position.z=5;

const starCount=35000;
const geometry=new THREE.BufferGeometry();
const positions=new Float32Array(starCount*3);

for(let i=0;i<starCount;i++){
positions[i*3]=(Math.random()-0.5)*200;
positions[i*3+1]=(Math.random()-0.5)*200;
positions[i*3+2]=(Math.random()-0.5)*200;
}
geometry.setAttribute("position",new THREE.BufferAttribute(positions,3));

const material=new THREE.PointsMaterial({color:0xffffff,size:0.015,opacity:0.7,transparent:true});
const stars=new THREE.Points(geometry,material);
scene.add(stars);

function animate(){
requestAnimationFrame(animate);
const pos=geometry.attributes.position.array;
for(let i=0;i<starCount;i++){
pos[i*3+2]+=0.25;
if(pos[i*3+2]>120){pos[i*3+2]=-200;}
}
geometry.attributes.position.needsUpdate=true;
renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
