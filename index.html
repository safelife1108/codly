<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODLY – Robotic Navy Master</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
:root{
--text:#ffffff;
--muted:#a0aed0;
--border:rgba(255,255,255,0.1);
--accent:#00eaff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;scroll-behavior:smooth;}

body{
background:radial-gradient(circle at 30% 20%, #001f4d 0%, #000c24 40%, #000000 80%);
color:var(--text);
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* ================= NAVBAR ================= */

header{
position:fixed;
top:0;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(15px);
border-bottom:1px solid var(--border);
z-index:1000;
transition:0.3s ease;
}

header.scrolled{
background:rgba(0,0,0,0.85);
box-shadow:0 5px 25px rgba(0,0,0,0.6);
}

.logo{
font-family:'Orbitron';
font-size:20px;
letter-spacing:2px;
}

nav a{
color:var(--muted);
text-decoration:none;
margin-left:30px;
font-size:14px;
position:relative;
transition:.3s;
}

nav a::after{
content:"";
position:absolute;
left:0;
bottom:-6px;
width:0;
height:2px;
background:var(--accent);
transition:.3s;
}

nav a:hover{
color:#fff;
}

nav a:hover::after{
width:100%;
}

/* ================= LOADER ================= */

.loader{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:5000;
}

.loader-text{
font-family:'Orbitron';
font-size:90px;
letter-spacing:12px;
position:relative;
color:#fff;
}

.loader-text::before,
.loader-text::after{
content:"CODLY";
position:absolute;
left:0;
top:0;
opacity:0.7;
}

.loader-text::before{
color:#00f0ff;
animation:glitch1 2s infinite linear alternate-reverse;
}

.loader-text::after{
color:#ff00ff;
animation:glitch2 2s infinite linear alternate-reverse;
}

@keyframes glitch1{
0%,100%{transform:translate(0);}
25%{transform:translate(-3px,2px);}
50%{transform:translate(3px,-2px);}
75%{transform:translate(-2px,3px);}
}

@keyframes glitch2{
0%,100%{transform:translate(0);}
25%{transform:translate(3px,-2px);}
50%{transform:translate(-3px,2px);}
75%{transform:translate(2px,-3px);}
}

/* ================= SECTION ================= */

section{
min-height:100vh;
padding:160px 8%;
position:relative;
z-index:2;
display:flex;
flex-direction:column;
justify-content:center;
}

.section-title{
font-family:'Orbitron';
font-size:42px;
margin-bottom:40px;
letter-spacing:3px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:35px;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.15);
border-radius:18px;
padding:35px;
transition:.4s;
color:#fff;
text-decoration:none;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 40px rgba(0,255,255,0.4);
}

/* ================= CTA ================= */

.cta{
padding:140px 8%;
text-align:center;
background:linear-gradient(180deg,rgba(0,30,90,0.6),rgba(0,0,0,0.9));
}

.cta button{
padding:18px 50px;
background:linear-gradient(90deg,#00eaff,#ff00ff,#ffee00);
border:none;
border-radius:50px;
font-weight:600;
color:#000;
cursor:pointer;
}

/* ================= FOOTER ================= */

.footer{
background:#000814;
padding:120px 8%;
border-top:1px solid var(--border);
}

.footer-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:60px;
}

.footer-bottom{
margin-top:60px;
padding-top:30px;
border-top:1px solid var(--border);
text-align:center;
color:#8ea0c5;
font-size:14px;
}
</style>
</head>

<body>

<div class="loader">
<h1 class="loader-text">CODLY</h1>
</div>

<canvas id="bg"></canvas>

<header id="navbar">
<div class="logo">CODLY</div>
<nav>
<a href="#about">About</a>
<a href="#services">Services</a>
<a href="#projects">Portfolio</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero">
<h1 style="font-family:Orbitron;font-size:clamp(100px,12vw,170px);letter-spacing:12px;">CODLY</h1>
<p>Engineering intelligent AI-powered digital ecosystems, scalable web architecture and performance marketing systems built for authority.</p>
</section>

<!-- KEEP ALL YOUR OTHER SECTIONS EXACTLY SAME BELOW -->

<script>

/* Navbar scroll effect */
window.addEventListener("scroll",()=>{
const nav=document.getElementById("navbar");
if(window.scrollY>50){
nav.classList.add("scrolled");
}else{
nav.classList.remove("scrolled");
}
});

/* Loader fade */
window.addEventListener("load",()=>{
gsap.to(".loader",{opacity:0,duration:1.5,delay:2,onComplete:()=>document.querySelector(".loader").style.display="none"});
});

/* Starfield */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById("bg"),alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
camera.position.z=5;

const starCount=30000;
const geometry=new THREE.BufferGeometry();
const positions=new Float32Array(starCount*3);

for(let i=0;i<starCount;i++){
positions[i*3]=(Math.random()-0.5)*200;
positions[i*3+1]=(Math.random()-0.5)*200;
positions[i*3+2]=(Math.random()-0.5)*200;
}

geometry.setAttribute("position",new THREE.BufferAttribute(positions,3));

const material=new THREE.PointsMaterial({
color:0xffffff,
size:0.015,
opacity:0.7,
transparent:true
});

const stars=new THREE.Points(geometry,material);
scene.add(stars);

function animate(){
requestAnimationFrame(animate);
const pos=geometry.attributes.position.array;
for(let i=0;i<starCount;i++){
pos[i*3+2]+=0.3;
if(pos[i*3+2]>120){pos[i*3+2]=-200;}
}
geometry.attributes.position.needsUpdate=true;
renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
