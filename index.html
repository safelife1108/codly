<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODLY – OMEGA MODE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
:root{
--bg:#000000;
--text:#ffffff;
--muted:#9aa3b2;
--border:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{
background:#000;
color:var(--text);
overflow-x:hidden;
}
canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* ===== LOADER ===== */
.loader{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:5000;
overflow:hidden;
}
.loader h1{
font-family:'Orbitron',sans-serif;
font-size:70px;
letter-spacing:8px;
position:relative;
color:#fff;
}
.loader h1::before,
.loader h1::after{
content:"CODLY";
position:absolute;
left:0;
top:0;
}
.loader h1::before{
color:#00ffff;
animation:glitch1 1s infinite linear alternate-reverse;
}
.loader h1::after{
color:#ff003c;
animation:glitch2 1s infinite linear alternate-reverse;
}

@keyframes glitch1{
0%{transform:translate(0);}
20%{transform:translate(-3px,2px);}
40%{transform:translate(-2px,-2px);}
60%{transform:translate(3px,1px);}
80%{transform:translate(1px,-1px);}
100%{transform:translate(0);}
}
@keyframes glitch2{
0%{transform:translate(0);}
20%{transform:translate(3px,-2px);}
40%{transform:translate(2px,2px);}
60%{transform:translate(-3px,-1px);}
80%{transform:translate(-1px,1px);}
100%{transform:translate(0);}
}

/* ===== HEADER ===== */
header{
position:fixed;
top:0;width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
border-bottom:1px solid var(--border);
z-index:1000;
}
.logo{display:flex;align-items:center;gap:10px;}
.logo img{height:30px;}
header a{
color:var(--muted);
text-decoration:none;
margin-left:25px;
font-size:14px;
transition:.3s;
}
header a:hover{color:#fff;}

section{
min-height:100vh;
padding:140px 8%;
position:relative;
z-index:2;
display:flex;
flex-direction:column;
justify-content:center;
}

/* ===== HERO ===== */
.hero h1{
font-family:'Orbitron',sans-serif;
font-size:clamp(70px,9vw,120px);
letter-spacing:6px;
position:relative;
}
.hero h1::after{
content:"OMEGA MODE";
position:absolute;
left:0;
top:0;
color:#00ffff;
opacity:0.4;
animation:glitchHero 2s infinite;
}
@keyframes glitchHero{
0%,100%{transform:translate(0);}
25%{transform:translate(3px,-2px);}
50%{transform:translate(-2px,3px);}
75%{transform:translate(2px,2px);}
}
.hero p{
margin-top:20px;
max-width:700px;
color:var(--muted);
font-size:18px;
}

/* ===== STORY ===== */
.story{
height:280vh;
}
.story-inner{
position:sticky;
top:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:60px;
text-align:center;
}
.reveal{
font-size:clamp(30px,4vw,55px);
font-weight:700;
}
.reveal span{
display:inline-block;
opacity:0;
transform:translateY(40px);
}

/* ===== FOOTER ===== */
.footer{
background:#000;
padding:120px 8%;
border-top:1px solid var(--border);
}
.footer-bottom{
margin-top:60px;
padding-top:30px;
border-top:1px solid var(--border);
text-align:center;
color:var(--muted);
font-size:13px;
}
</style>
</head>

<body>

<div class="loader"><h1>CODLY</h1></div>
<canvas id="bg"></canvas>

<header>
<div class="logo">
<img src="codly logo.jpg">
<strong>CODLY</strong>
</div>
<nav>
<a href="#about">About</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero">
<h1>OMEGA MODE</h1>
<p>Digital engineering beyond dimensions. Crafting immersive systems that command attention and convert presence into power.</p>
</section>

<!-- YOUR REMAINING SECTIONS STAY SAME -->

<script>
gsap.registerPlugin(ScrollTrigger);

/* Loader Exit */
window.addEventListener("load",()=>{
gsap.to(".loader",{opacity:0,duration:1.5,delay:2,onComplete:()=>document.querySelector(".loader").style.display="none"});
});

/* Text Reveal */
document.querySelectorAll(".reveal").forEach((el,i)=>{
gsap.to(el.querySelectorAll("span"),{
opacity:1,
y:0,
stagger:0.15,
scrollTrigger:{
trigger:".story",
start:"top+=" + (i*600),
end:"top+=" + (i*600+400),
scrub:true
}
});
});

/* ===== REAL TWINKLING SPACE ===== */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById("bg")});
renderer.setSize(window.innerWidth,window.innerHeight);
camera.position.z=5;

const starCount=15000;
const geometry=new THREE.BufferGeometry();
const positions=[];
const colors=[];
const sizes=[];

for(let i=0;i<starCount;i++){
positions.push((Math.random()-0.5)*200);
positions.push((Math.random()-0.5)*200);
positions.push((Math.random()-0.5)*200);

colors.push(1,1,1);
sizes.push(Math.random()*1.5);
}

geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors,3));

const material=new THREE.PointsMaterial({
size:0.7,
vertexColors:true,
transparent:true,
opacity:0.8
});

const stars=new THREE.Points(geometry,material);
scene.add(stars);

function animate(){
requestAnimationFrame(animate);

stars.rotation.y+=0.0005;

/* twinkle effect */
material.opacity=0.6 + Math.sin(Date.now()*0.002)*0.2;

renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

</body>
</html>
