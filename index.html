<!DOCTYPE html>
<html lang="en">
<head>

      justify-content: center;

      text-align: center;

    .card {

    h1 {

      margin-bottom: 10px;
    }
    h2 {
      font-size: 22px;

      color: #444;

    }
    p {
      color: #666;
    }
    .services {
      margin-top: 20px;
      font-weight: bold;
    }
    .contact {
      margin-top: 20px;
      color: #2563eb;
      font-weight: bold;
    }
  </style>
</head>
<body>

    <h1>Codly</h1>

    <p>Build smarter. Grow faster.</p>

    <div class="services">
