<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PowerFlex Gym</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0c10;
  --bg2:#11151c;
  --card:#151922;
  --text:#ffffff;
  --muted:#b9c0cc;
  --accent:#ff1f1f;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);overflow-x:hidden}

/* ================= CINEMATIC LOADER ================= */
#loader{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
}
.loader-text{
  font-size:70px;
  font-weight:900;
  letter-spacing:15px;
  color:var(--accent);
  opacity:0;
  animation:reveal 2s ease forwards;
}
.loader-bar{
  width:0;
  height:4px;
  background:var(--accent);
  margin-top:20px;
  animation:bar 2.5s ease forwards;
}
@keyframes reveal{
  0%{opacity:0;letter-spacing:40px}
  100%{opacity:1;letter-spacing:15px}
}
@keyframes bar{
  0%{width:0}
  100%{width:260px}
}

/* ================= GLOBAL ================= */
.container{width:90%;max-width:1200px;margin:auto;}
section{padding:100px 0;}
.section-title{text-align:center;margin-bottom:60px;}
.section-title h2{font-size:38px;font-weight:800;}
.section-title h2 span{color:var(--accent);}
.section-title p{color:var(--muted);margin-top:10px;}
.reveal{opacity:0;transform:translateY(40px);transition:1s ease;}
.reveal.active{opacity:1;transform:none}

/* ================= HEADER ================= */
header{
  position:fixed;
  top:0;left:0;width:100%;
  background:rgba(10,12,16,0.95);
  border-bottom:1px solid #1c1f27;
  backdrop-filter:blur(8px);
  z-index:1000;
}
.nav{display:flex;align-items:center;justify-content:space-between;padding:18px 0;}
.logo{font-weight:900;color:var(--accent);font-size:20px;letter-spacing:2px;}
nav ul{display:flex;gap:24px;list-style:none;}
nav ul li a{
  color:#ddd;
  text-decoration:none;
  font-size:14px;
  position:relative;
}
nav ul li a::after{
  content:"";
  position:absolute;
  bottom:-6px;
  left:0;
  width:0;
  height:2px;
  background:var(--accent);
  transition:.3s;
}
nav ul li a:hover::after{width:100%}
.btn{
  background:var(--accent);
  color:#000;
  padding:10px 20px;
  border-radius:8px;
  font-weight:700;
  text-decoration:none;
  transition:.3s;
}
.btn:hover{box-shadow:0 0 20px var(--accent)}

/* ================= HERO ================= */
.hero{
  min-height:100vh;
  background:url("https://images.unsplash.com/photo-1558611848-73f7eb4001a1?auto=format&fit=crop&w=1800&q=80") center/cover no-repeat;
  position:relative;
  display:flex;
  align-items:center;
  margin-top:70px;
  background-attachment:fixed;
}
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to right,rgba(0,0,0,.9),rgba(0,0,0,.6));
}
.hero-content{position:relative;z-index:2;max-width:700px;}
.hero h1{font-size:60px;font-weight:900;}
.hero h1 span{color:var(--accent);}
.hero p{margin:20px 0;color:#ddd;}
.actions{display:flex;gap:15px;margin-top:20px;}
.stats{display:flex;gap:30px;margin-top:40px;flex-wrap:wrap;}
.stat h3{color:var(--accent);font-size:32px;font-weight:800;}
.stat p{font-size:13px;color:#ccc;}

/* ================= CARDS ================= */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px;}
.card{
  background:var(--card);
  border-radius:16px;
  overflow:hidden;
  transition:.4s;
  border:1px solid #1f2430;
}
.card:hover{
  transform:translateY(-8px);
  border-color:var(--accent);
  box-shadow:0 0 25px rgba(255,0,0,.2);
}
.card img{width:100%;height:200px;object-fit:cover;}
.card .content{padding:20px;}
.card h4{margin-bottom:8px;font-weight:700;}
.card p{font-size:13px;color:var(--muted);}

/* ================= PRICING ================= */
.price-card{
  background:var(--card);
  padding:30px;
  border-radius:18px;
  text-align:center;
  border:1px solid #1f2430;
  transition:.4s;
}
.price-card.popular{
  background:linear-gradient(180deg,#ff1f1f,#b30000);
  color:#000;
  transform:scale(1.07);
}
.price-card ul{list-style:none;margin:15px 0;}
.price-card ul li{margin:8px 0;font-size:13px;}
.price-card:hover{transform:translateY(-10px);}

/* ================= FOOTER ================= */
footer{
  background:#080a0e;
  padding:70px 0 20px;
}
.footer-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:30px;
}
footer p{color:#aaa;font-size:13px;}
.footer-bottom{
  text-align:center;
  margin-top:30px;
  color:#777;
  border-top:1px solid #1c1f27;
  padding-top:15px;
}
@media(max-width:800px){
  .hero h1{font-size:40px;}
  nav ul{display:none;}
}
</style>
</head>
<body>

<div id="loader">
  <div class="loader-text">POWERFLEX</div>
  <div class="loader-bar"></div>
</div>

<!-- YOUR ORIGINAL HTML STRUCTURE CONTINUES EXACTLY SAME BELOW -->
<!-- (All your sections remain unchanged — only enhanced visually) -->

<script>
window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById("loader").style.opacity="0";
    setTimeout(()=>{document.getElementById("loader").style.display="none"},600);
  },2200);
});

/* Scroll Reveal */
const reveals=document.querySelectorAll(".reveal");
const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){entry.target.classList.add("active");}
});
},{threshold:0.15});
reveals.forEach(r=>observer.observe(r));
</script>

</body>
</html>
