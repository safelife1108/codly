<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PowerFlex Cinematic Intro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#000;
  overflow:hidden;
}
canvas{
  position:fixed;
  inset:0;
}
</style>
</head>
<body>

<canvas id="webgl"></canvas>

<!-- THREE JS MUST LOAD FIRST -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<script>

/* ================================
   BASIC ENGINE SETUP
================================ */

const canvas = document.getElementById("webgl");
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  3000
);

camera.position.z = 600;

const renderer = new THREE.WebGLRenderer({
  canvas: canvas,
  antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

/* ================================
   PARTICLE SYSTEM
================================ */

const PARTICLE_COUNT = 3000;

const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(PARTICLE_COUNT * 3);
const targets = new Float32Array(PARTICLE_COUNT * 3);

/* Initial random positions */

for (let i = 0; i < PARTICLE_COUNT; i++) {
  positions[i * 3] = (Math.random() - 0.5) * 1000;
  positions[i * 3 + 1] = (Math.random() - 0.5) * 600;
  positions[i * 3 + 2] = (Math.random() - 0.5) * 600;
}

geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

const material = new THREE.PointsMaterial({
  color: 0xff1a1a,
  size: 3
});

const particles = new THREE.Points(geometry, material);
scene.add(particles);

/* ================================
   TEXT TO PARTICLE SAMPLER
================================ */

function textToPoints(text, size) {

  const tempCanvas = document.createElement("canvas");
  const ctx = tempCanvas.getContext("2d");

  tempCanvas.width = 800;
  tempCanvas.height = 300;

  ctx.fillStyle = "white";
  ctx.font = "bold " + size + "px Arial";
  ctx.textAlign = "center";
  ctx.fillText(text, tempCanvas.width / 2, tempCanvas.height / 2 + size / 3);

  const data = ctx.getImageData(0, 0, tempCanvas.width, tempCanvas.height).data;
  const points = [];

  for (let y = 0; y < tempCanvas.height; y += 5) {
    for (let x = 0; x < tempCanvas.width; x += 5) {
      const index = (y * tempCanvas.width + x) * 4;
      if (data[index] > 150) {
        points.push({
          x: (x - tempCanvas.width / 2),
          y: (tempCanvas.height / 2 - y)
        });
      }
    }
  }

  return points;
}

const pfShape = textToPoints("PF", 200);
const fullShape = textToPoints("POWERFLEX", 90);

function setShape(shape) {
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    if (i < shape.length) {
      targets[i * 3] = shape[i].x * 2;
      targets[i * 3 + 1] = shape[i].y * 2;
      targets[i * 3 + 2] = 0;
    } else {
      targets[i * 3] = (Math.random() - 0.5) * 1000;
      targets[i * 3 + 1] = (Math.random() - 0.5) * 600;
      targets[i * 3 + 2] = (Math.random() - 0.5) * 600;
    }
  }
}

setShape(pfShape);

/* ================================
   STAGE CONTROLLER
================================ */

let stage = 0;
let timer = 0;

function animate() {

  requestAnimationFrame(animate);

  timer += 0.01;

  const pos = geometry.attributes.position.array;

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    pos[i * 3] += (targets[i * 3] - pos[i * 3]) * 0.07;
    pos[i * 3 + 1] += (targets[i * 3 + 1] - pos[i * 3 + 1]) * 0.07;
    pos[i * 3 + 2] += (targets[i * 3 + 2] - pos[i * 3 + 2]) * 0.07;
  }

  geometry.attributes.position.needsUpdate = true;

  /* Stage logic */

  if (stage === 0 && timer > 3) {
    stage = 1;
    timer = 0;
  }

  if (stage === 1 && timer > 2) {
    // explode
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      targets[i * 3] = (Math.random() - 0.5) * 1200;
      targets[i * 3 + 1] = (Math.random() - 0.5) * 800;
      targets[i * 3 + 2] = (Math.random() - 0.5) * 800;
    }
    stage = 2;
    timer = 0;
  }

  if (stage === 2 && timer > 2) {
    setShape(fullShape);
    stage = 3;
    timer = 0;
  }

  if (stage === 3 && timer > 4) {
    camera.position.z -= 1;
  }

  renderer.render(scene, camera);
}

animate();

/* ================================
   RESIZE HANDLER
================================ */

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
