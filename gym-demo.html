<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PowerFlex — Cinematic Intro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#000;
  overflow:hidden;
}
#webgl{
  position:fixed;
  inset:0;
}
</style>
</head>
<body>

<canvas id="webgl"></canvas>

<!-- LOAD THREE FIRST -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<script>
/* ================= ENGINE SETUP ================= */

const canvas = document.getElementById("webgl");

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  5000
);
camera.position.z = 1000;

const renderer = new THREE.WebGLRenderer({
  canvas: canvas,
  antialias: true
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

/* ================= PARTICLE SYSTEM ================= */

const PARTICLE_COUNT = 3500;

const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(PARTICLE_COUNT * 3);
const targets = new Float32Array(PARTICLE_COUNT * 3);

for(let i=0;i<PARTICLE_COUNT;i++){
  positions[i*3]=(Math.random()-0.5)*2000;
  positions[i*3+1]=(Math.random()-0.5)*2000;
  positions[i*3+2]=(Math.random()-0.5)*2000;
}

geometry.setAttribute("position", new THREE.BufferAttribute(positions,3));

const material = new THREE.PointsMaterial({
  color:0xe50914,
  size:3
});

const particles = new THREE.Points(geometry,material);
scene.add(particles);

/* ================= TEXT SAMPLING ================= */

function textToPoints(text, size){
  const c = document.createElement("canvas");
  const ctx = c.getContext("2d");

  c.width = 1000;
  c.height = 400;

  ctx.fillStyle = "white";
  ctx.font = `bold ${size}px Arial`;
  ctx.textAlign = "center";
  ctx.fillText(text, c.width/2, c.height/2 + size/3);

  const data = ctx.getImageData(0,0,c.width,c.height).data;
  const points = [];

  for(let y=0;y<c.height;y+=6){
    for(let x=0;x<c.width;x+=6){
      const index=(y*c.width+x)*4;
      if(data[index]>150){
        points.push({
          x:(x-c.width/2)*2,
          y:(c.height/2-y)*2
        });
      }
    }
  }
  return points;
}

const pfShape = textToPoints("PF",260);
const fullShape = textToPoints("POWERFLEX",110);

function setShape(shape){
  for(let i=0;i<PARTICLE_COUNT;i++){
    if(i<shape.length){
      targets[i*3]=shape[i].x;
      targets[i*3+1]=shape[i].y;
      targets[i*3+2]=0;
    }else{
      targets[i*3]=(Math.random()-0.5)*3000;
      targets[i*3+1]=(Math.random()-0.5)*3000;
      targets[i*3+2]=(Math.random()-0.5)*3000;
    }
  }
}

/* ================= STAGE LOGIC ================= */

let stage=0;
let timer=0;

setShape(pfShape);

function animate(){
  requestAnimationFrame(animate);

  timer+=0.01;

  const pos = geometry.attributes.position.array;

  for(let i=0;i<PARTICLE_COUNT;i++){
    pos[i*3]+= (targets[i*3]-pos[i*3]) * 0.08;
    pos[i*3+1]+= (targets[i*3+1]-pos[i*3+1]) * 0.08;
    pos[i*3+2]+= (targets[i*3+2]-pos[i*3+2]) * 0.08;
  }

  geometry.attributes.position.needsUpdate=true;

  /* Stage transitions */

  if(stage===0 && timer>3){
    stage=1;
    timer=0;
  }

  if(stage===1 && timer>2){
    for(let i=0;i<PARTICLE_COUNT;i++){
      targets[i*3]=(Math.random()-0.5)*4000;
      targets[i*3+1]=(Math.random()-0.5)*4000;
      targets[i*3+2]=(Math.random()-0.5)*4000;
    }
    stage=2;
    timer=0;
  }

  if(stage===2 && timer>2){
    setShape(fullShape);
    stage=3;
    timer=0;
  }

  if(stage===3 && timer>4){
    camera.position.z -= 3;
  }

  renderer.render(scene,camera);
}

animate();

/* ================= RESIZE ================= */

window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

</body>
</html>
